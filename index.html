<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Accordion</title>
</head>
<body>

<h1>Accordion</h1>
<p id="status">Loading...</p>
<pre id="output"></pre>

<button onclick="send('undo')">Undo</button>
<button onclick="send('restart')">Restart</button>
<button onclick="send('new')">New game</button>
<br><br>

<input id="cmd" placeholder="e.g. leap AH or step 10C" size="40" />
<button onclick="submitCmd()">Run</button>

<script>
  var Module = {
    onRuntimeInitialized: function() {
      document.getElementById('status').textContent = 'Ready';
      send('new');
    }
  };

  function send(input) {
    const result = Module.ccall('processCommand', 'string', ['string'], [input]);
    document.getElementById('output').textContent = result;
  }

  function submitCmd() {
    const input = document.getElementById('cmd').value.trim();
    if (!input) return;
    document.getElementById('cmd').value = '';
    send(input);
  }

  document.getElementById('cmd').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitCmd();
  });
</script>

<script src="accordion.js"></script>
</body>
</html>
